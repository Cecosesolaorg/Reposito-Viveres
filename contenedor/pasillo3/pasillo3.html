<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASILLO 3 PANES | Cecosesola</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="pasillo.css">
</head>
<body class="pasillo-body">
    <div class="background-glow"></div>

    <div class="pasillo-wrapper">
        <header class="pasillo-header">
            <div class="header-left">
                <div class="header-info">
                    <span class="company-tag">CECOSESOLA J085030140</span>
                    <span class="date-tag" id="current-date">FECHA: --/--/----</span>
                </div>
                <div class="header-main">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <a href="../../index.html" class="back-btn" title="Volver al Inicio">🏠</a>
                        <h1 class="aisle-title">03-PASILLO-PANES</h1>
                        <div class="counted-badge">
                            <span id="counted-total">0</span> PRODUCTOS
                        </div>
                    </div>
                    <p class="brand-name">FERIA DEL ESTE</p>
                </div>
            </div>
            <div class="teams-container">
                <div class="team-card team-1">
                    <header>EQUIPO DE TRABAJO</header>
                    <div class="resp">RESPONSABLE DIRECTO: <strong id="team1-resp1">CARGANDO...</strong></div>
                    <div class="resp">COMPAÑERO: <strong id="team1-resp2">CARGANDO...</strong></div>
                    <div class="resp">AYUDA: <strong id="team1-ayudante">SIN ASIGNAR</strong></div>
                </div>
            </div>
        </header>

        <section class="actions-bar">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="Buscar producto..." id="productSearch">
            </div>

            <div class="button-group" style="display: flex; gap: 10px; align-items: center;">
                <div class="toggle-group">
                    <span class="toggle-label">comparacion</span>
                    <label class="switch">
                        <input type="checkbox" id="fullListToggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <button class="icon-btn trash" id="clearBtn" title="Limpiar"><span class="icon">🗑️</span></button>
                <button class="icon-btn orange" id="helperBtn" title="Asignar Ayudante"><span class="icon">🤝AYUDA</span></button>
                <button class="action-btn purple" id="addProductBtn">Agregar Prod</button>
                <button class="action-btn green" id="downloadBtn">📥 Descargar</button>
            </div>
        </section>

        <main class="inventory-table-container">
            <table class="inventory-table">
                <thead>
                    <tr>
                        <th class="col-check">PRODUCTO</th>
                        <th class="col-qty" style="text-align: center;">CONTEO</th>
                        <th class="col-diff" style="text-align: center;">DIF</th>
                    </tr>
                </thead>
                <tbody id="inventory-body">
                    <!-- Products injected by InventoryCore -->
                </tbody>
            </table>
        </main>
    </div>

    <!-- MODAL AYUDANTE -->
    <div id="helperModal" class="modal">
        <div class="modal-content image-style-modal" style="max-width: 400px;">
            <header class="image-style-header">
                <div class="product-bar"></div>
                <h3>¿QUIÉN TE AYUDA?</h3>
                <p class="saved-info">Selecciona un compañero de la lista</p>
            </header>
            <div id="helperList" style="max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 5px;"></div>
            <div class="image-style-footer" style="margin-top: 20px;">
                <button class="btn-img-cerrar" onclick="closeHelperModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="../../src/products.js"></script>
    <script src="../../src/staff.js"></script>
    <script src="../../src/inventory_core.js"></script>
    <script src="../../src/calculator.js"></script>
    <script src="../../src/helpers.js"></script>
    <script src="../../src/excel_export.js"></script>
    <script src="pasillo.js"></script>
</body>
</html>
